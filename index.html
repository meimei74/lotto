<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추출기</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: #fff; width: 100%; max-width: 800px; padding: 25px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #008CBA; margin-bottom: 30px; }
        h3 { border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 30px; color: #555; text-align: center; }
        .input-group { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; justify-content: center; margin-bottom: 15px; }
        .input-group input[type="number"] { width: 60px; padding: 8px; text-align: center; border: 1px solid #ccc; border-radius: 6px; }
        .input-group input[type="text"] { padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
        .btn { padding: 10px 16px; border: none; border-radius: 6px; background-color: #008CBA; color: white; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        .btn:hover { background-color: #007bb5; }
        .btn-excel { background-color: #27ae60; }
        .btn-excel:hover { background-color: #219150; }
        .btn-secondary { background-color: #7f8c8d; }
        .btn-secondary:hover { background-color: #636e72; }
        .result-box { background-color: #eafaf1; border: 1px solid #a8e6cf; padding: 20px; border-radius: 8px; margin-top: 20px; font-size: 1.4em; font-weight: bold; text-align: center; line-height: 1.6; }
        .status-text { text-align: center; color: #888; font-size: 0.9em; margin-top: 10px; font-weight: bold; }
        .loading { color: #3498db; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎰 로또 번호 추출기 (Cloud)</h2>

    <h3>📝 최근 당첨 번호 입력</h3>
    <div class="input-group">
        <input type="number" id="round" placeholder="회차"> <span>|</span>
        <input type="number" id="n1" placeholder="1번">
        <input type="number" id="n2" placeholder="2번">
        <input type="number" id="n3" placeholder="3번">
        <input type="number" id="n4" placeholder="4번">
        <input type="number" id="n5" placeholder="5번">
        <input type="number" id="n6" placeholder="6번"> <span>|</span>
        <input type="number" id="bonus" placeholder="보너스">
        <button class="btn" onclick="saveDraw()">저장</button>
        
        <input type="file" id="excelUpload" accept=".xlsx, .xls" style="display:none;" onchange="handleExcelUpload(event)">
        <button class="btn btn-excel" onclick="document.getElementById('excelUpload').click()">엑셀 업로드</button>
    </div>
    
    <div id="dataStatus" class="status-text loading">구글 시트에서 데이터를 불러오는 중...</div>

    <h3>📌 고정수 설정 & 필터 통과 번호 뽑기</h3>
    <div style="display: flex; flex-direction: column; align-items: center; gap: 15px;">
        <div class="input-group">
            <input type="text" id="fixedNums" placeholder="고정수 (예: 1, 7) 최대 5개" style="width: 220px;">
            <button class="btn" onclick="generateLotto(100)">최근 100회</button>
            <button class="btn" onclick="generateLotto(50)">최근 50회</button>
            <button class="btn" onclick="generateLotto(30)">최근 30회</button>
            <button class="btn btn-secondary" onclick="resetSelection()">리셋</button>
        </div>
    </div>

    <div id="resultArea" class="result-box" style="display: none;"></div>
</div>

<script>
    // 🚨 여기에 아까 복사한 구글 웹 앱 URL 주소를 넣어줘!
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwvab-whJGjxjEyjbG7zbSwIcemWEwBEQmYe6ZdU0iVFMbBOS7cNZenrbXLw_8vGru2Jg/exec';

    let lottoHistory = [];

    // 실시간 구글 시트에서 데이터 받아오기
    async function loadDataFromCloud() {
        const statusDiv = document.getElementById('dataStatus');
        statusDiv.className = "status-text loading";
        statusDiv.innerText = "구글 시트에서 최신 데이터를 동기화하는 중...";
        try {
            const response = await fetch(GAS_URL);
            lottoHistory = await response.json();
            statusDiv.className = "status-text";
            statusDiv.innerText = `현재 클라우드에 저장된 데이터: ${lottoHistory.length}개 (최대 100개 유지)`;
        } catch (error) {
            statusDiv.className = "status-text";
            statusDiv.style.color = "red";
            statusDiv.innerText = "데이터 동기화 실패! URL 설정을 확인해줘.";
        }
    }

    // 수동 입력 클라우드 저장
    async function saveDraw() {
        const round = parseInt(document.getElementById('round').value);
        const nums = [
            parseInt(document.getElementById('n1').value), parseInt(document.getElementById('n2').value),
            parseInt(document.getElementById('n3').value), parseInt(document.getElementById('n4').value),
            parseInt(document.getElementById('n5').value), parseInt(document.getElementById('n6').value)
        ];
        const bonus = parseInt(document.getElementById('bonus').value);

        if(isNaN(round) || nums.includes(NaN) || isNaN(bonus)) {
            alert('회차와 모든 번호를 정확히 입력해줘!');
            return;
        }
        nums.sort((a, b) => a - b);

        const data = { round, nums, bonus };
        
        document.getElementById('dataStatus').innerText = "클라우드에 저장 중...";
        
        // CORS 우회 처리를 위해 no-cors 모드로 포스트 전송
        await fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(data)
        });

        alert(`${round}회 당첨번호가 클라우드에 저장되었어!`);
        document.querySelectorAll('.input-group input[type="number"]').forEach(input => input.value = '');
        setTimeout(loadDataFromCloud, 1500); // 시트 반영 시간 대기 후 갱신
    }

    // 엑셀 대량 업로드 클라우드 저장
    function handleExcelUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(firstSheet, {header: 1});

            let newRecords = [];
            rows.forEach(row => {
                if (row.length >= 8) {
                    const round = parseInt(row[0]);
                    const nums = [parseInt(row[1]), parseInt(row[2]), parseInt(row[3]), parseInt(row[4]), parseInt(row[5]), parseInt(row[6])];
                    const bonus = parseInt(row[7]);

                    if (!isNaN(round) && !nums.includes(NaN) && !isNaN(bonus)) {
                        nums.sort((a, b) => a - b);
                        newRecords.push({ round, nums, bonus });
                    }
                }
            });

            if (newRecords.length > 0) {
                document.getElementById('dataStatus').innerText = "대량 데이터 클라우드 전송 중...";
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(newRecords)
                });
                alert(`엑셀 데이터 ${newRecords.length}개가 클라우드 DB에 동기화되었어!`);
                setTimeout(loadDataFromCloud, 2000);
            } else {
                alert('유효한 데이터 형식이 아닙니다.');
            }
            event.target.value = '';
        };
        reader.readAsArrayBuffer(file);
    }

    function resetSelection() {
        document.getElementById('fixedNums').value = '';
        const resultArea = document.getElementById('resultArea');
        resultArea.style.display = 'none';
        resultArea.innerHTML = '';
    }

    function getFixedNumbers() {
        const input = document.getElementById('fixedNums').value;
        if(!input.trim()) return [];
        let nums = input.split(',').map(n => parseInt(n.trim()));
        nums = nums.filter(n => !isNaN(n) && n >= 1 && n <= 45);
        return [...new Set(nums)];
    }

    function isValidPattern(nums, lastDrawNums, targetHistory) {
        const sum = nums.reduce((a, b) => a + b, 0);
        if (sum < 100 || sum > 210) return false;

        let maxConsecutive = 1, currentConsecutive = 1;
        for(let i = 0; i < nums.length - 1; i++){
            if(nums[i] + 1 === nums[i+1]) {
                currentConsecutive++;
                maxConsecutive = Math.max(maxConsecutive, currentConsecutive);
            } else { currentConsecutive = 1; }
        }
        if(maxConsecutive >= 3) return false;

        let endDigits = new Array(10).fill(0);
        for(let num of nums) endDigits[num % 10]++;
        if(endDigits.some(count => count >= 3)) return false;

        let oddCount = nums.filter(n => n % 2 !== 0).length;
        if(oddCount < 2 || oddCount > 4) return false;

        let sections = [0, 0, 0];
        for(let num of nums) {
            if(num <= 15) sections[0]++;
            else if(num <= 30) sections[1]++;
            else sections[2]++;
        }
        if(sections.includes(0)) return false;

        if (lastDrawNums && lastDrawNums.length === 6) {
            let matchCount = nums.filter(n => lastDrawNums.includes(n)).length;
            if (matchCount >= 3) return false;
        }

        if (targetHistory && targetHistory.length > 0) {
            for (let past of targetHistory) {
                let isSame = past.nums.every((val, index) => val === nums[index]);
                if (isSame) return false;
            }
        }
        return true;
    }

    function generateLotto(analysisLimit) {
        if (lottoHistory.length === 0) {
            alert('아직 클라우드에 로드된 당첨번호가 없어! 잠시만 기다리거나 데이터를 입력해줘.');
            return;
        }
        const targetHistory = lottoHistory.slice(0, analysisLimit);
        const lastDrawNums = targetHistory.length > 0 ? targetHistory[0].nums : null;
        const fixedNums = getFixedNumbers();

        if (fixedNums.length > 5) {
            alert('고정수는 최대 5개까지만 입력할 수 있어!');
            return;
        }
        
        let generatedSet = null;
        let attempts = 0;

        while(!generatedSet && attempts < 50000) {
            attempts++;
            let candSet = new Set(fixedNums);
            while(candSet.size < 6) { candSet.add(Math.floor(Math.random() * 45) + 1); }
            let arr = Array.from(candSet).sort((a,b) => a-b);
            if(isValidPattern(arr, lastDrawNums, targetHistory)) { generatedSet = arr; }
        }

        const resultArea = document.getElementById('resultArea');
        resultArea.style.display = 'block';

        if(generatedSet) {
            const sum = generatedSet.reduce((a, b) => a + b, 0);
            const formatNumbers = (numsSet) => {
                return numsSet.map(n => 
                    fixedNums.includes(n) ? `<span style="color:#e74c3c; font-weight:900; text-decoration:underline;">${n}</span>` : n
                ).join(', ');
            };

            resultArea.innerHTML = 
                `<span style="color:#008CBA;">추천 조합:</span> [ ${formatNumbers(generatedSet)} ] <br>
                 <span style="font-size:0.6em; color:#888;">(합계: ${sum})</span>
                 <div style="font-size:0.5em; color:#999; margin-top:10px; font-weight:normal;">* 최근 ${analysisLimit}회 데이터 기준 이월수 및 중복 제외 (시도횟수: ${attempts}번)</div>`;
        } else {
            resultArea.innerHTML = "고정수와 필터 조건이 충돌해서 번호를 찾지 못했어. 고정수를 조금 변경해 봐!";
        }
    }

    // 켜지자마자 클라우드 DB 연결
    window.onload = loadDataFromCloud;
</script>

</body>
</html>
