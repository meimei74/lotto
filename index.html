<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>로또 번호 추출기</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            background-color: #f4f7f6; 
            color: #333; 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            justify-content: center; 
        }
        .container { 
            background: #fff; 
            width: 100%; 
            max-width: 600px; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        h2 { text-align: center; color: #008CBA; margin-top: 0; margin-bottom: 25px; font-size: 1.6em; }
        h3 { border-bottom: 2px solid #eee; padding-bottom: 8px; margin-top: 30px; margin-bottom: 15px; color: #555; text-align: center; font-size: 1.15em; }
        
        /* 공통 입력칸 스타일 */
        input[type="number"], input[type="text"] { 
            width: 100%; 
            padding: 12px; 
            text-align: center; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            font-size: 16px; 
            background-color: #fafafa;
            outline: none;
        }
        input:focus { border-color: #008CBA; background-color: #fff; }
        
        /* 버튼 공통 스타일 */
        .btn { 
            width: 100%;
            padding: 14px 10px; 
            border: none; 
            border-radius: 8px; 
            background-color: #008CBA; 
            color: white; 
            font-weight: bold; 
            font-size: 15px;
            cursor: pointer; 
            transition: all 0.3s; 
        }
        .btn:hover { background-color: #007bb5; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn-excel { background-color: #27ae60; }
        .btn-excel:hover { background-color: #219150; }
        .btn-secondary { background-color: #7f8c8d; }
        .btn-secondary:hover { background-color: #636e72; }
        
        /* 그리드 시스템 */
        .num-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin: 10px 0; }
        .side-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-group-full { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 10px; }

        /* 결과창 */
        .result-box { 
            background-color: #eafaf1; 
            border: 1px solid #a8e6cf; 
            padding: 25px 15px; 
            border-radius: 10px; 
            margin-top: 20px; 
            font-size: 1.3em; 
            font-weight: bold; 
            text-align: center; 
            line-height: 1.6; 
            word-break: keep-all;
        }
        
        /* 상태 텍스트 */
        .status-text { text-align: center; color: #888; font-size: 0.95em; margin: 20px 0; font-weight: bold; padding: 10px; background: #f9f9f9; border-radius: 8px; }
        .loading { color: #3498db; }
        
        .info-text { text-align: center; font-size: 0.85em; color: #666; margin-top: 6px; }
        .excel-guide { 
            font-size: 0.8em; 
            color: #999; 
            text-align: center; 
            margin-top: 10px; 
            line-height: 1.5; 
            padding: 10px; 
            border: 1px dashed #ddd; 
            border-radius: 8px;
        }

        /* 모바일 최적화 (600px 이하) */
        @media (max-width: 600px) {
            .num-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .btn-group { grid-template-columns: 1fr; }
            h2 { font-size: 1.4em; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎰 로또 번호 추출기 (Cloud)</h2>

    <h3>🎯 고정수 설정 & 번호 뽑기</h3>
    <input type="text" id="fixedNums" placeholder="고정수 (예: 1, 7) 최대 5개">
    <div class="info-text">(쉼표로 구분하여 입력)</div>

    <div class="btn-group-full" style="margin-top:15px;">
        <button class="btn" onclick="generateLotto(100)">최근 100회 데이터 기준 추출</button>
        <button class="btn" onclick="generateLotto(50)">최근 50회 데이터 기준 추출</button>
        <button class="btn" onclick="generateLotto(30)">최근 30회 데이터 기준 추출</button>
        <button class="btn btn-secondary" onclick="resetSelection()">입력 및 결과 리셋</button>
    </div>

    <div id="resultArea" class="result-box" style="display: none;"></div>

    <div id="dataStatus" class="status-text loading">데이터 동기화 중...</div>

    <h3>📝 최근 당첨 번호 데이터 입력</h3>
    
    <div class="side-inputs">
        <input type="number" id="round" placeholder="회차">
        <input type="number" id="bonus" placeholder="보너스">
    </div>
    
    <div class="num-grid">
        <input type="number" id="n1" placeholder="1번">
        <input type="number" id="n2" placeholder="2번">
        <input type="number" id="n3" placeholder="3번">
        <input type="number" id="n4" placeholder="4번">
        <input type="number" id="n5" placeholder="5번">
        <input type="number" id="n6" placeholder="6번">
    </div>

    <div class="btn-group">
        <button class="btn" onclick="saveDraw()">수동 저장</button>
        <button class="btn btn-excel" onclick="document.getElementById('excelUpload').click()">엑셀 업로드</button>
        <input type="file" id="excelUpload" accept=".xlsx, .xls" style="display:none;" onchange="handleExcelUpload(event)">
    </div>

    <div class="excel-guide">
        <b>[엑셀 업로드 가이드]</b><br>
        A열:회차 | B~G열:당첨번호(1~6) | H열:보너스<br>
        제목줄이 있어도 숫자가 있는 행부터 자동으로 인식합니다.
    </div>
</div>

<script>
    // 🚨 여기에 구글 앱스 스크립트 배포 후 받은 웹 앱 URL을 넣어줘!
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwvab-whJGjxjEyjbG7zbSwIcemWEwBEQmYe6ZdU0iVFMbBOS7cNZenrbXLw_8vGru2Jg/exec'; 

    let lottoHistory = [];

    // 클라우드 데이터 로드
    async function loadDataFromCloud() {
        const statusDiv = document.getElementById('dataStatus');
        statusDiv.className = "status-text loading";
        statusDiv.innerText = "구글 시트에서 데이터를 불러오는 중...";
        try {
            const response = await fetch(GAS_URL);
            lottoHistory = await response.json();
            statusDiv.className = "status-text";
            statusDiv.innerText = `현재 저장된 데이터: ${lottoHistory.length}개`;
        } catch (error) {
            statusDiv.className = "status-text";
            statusDiv.style.color = "red";
            statusDiv.innerText = "연결 실패! 구글 시트 설정을 확인해줘.";
        }
    }

    // 데이터 개별 저장
    async function saveDraw() {
        const round = parseInt(document.getElementById('round').value);
        const nums = [
            parseInt(document.getElementById('n1').value), parseInt(document.getElementById('n2').value),
            parseInt(document.getElementById('n3').value), parseInt(document.getElementById('n4').value),
            parseInt(document.getElementById('n5').value), parseInt(document.getElementById('n6').value)
        ];
        const bonus = parseInt(document.getElementById('bonus').value);

        if(isNaN(round) || nums.includes(NaN) || isNaN(bonus)) {
            alert('회차와 모든 번호를 정확히 입력해줘!');
            return;
        }
        nums.sort((a, b) => a - b);

        document.getElementById('dataStatus').innerText = "데이터 업로드 중...";
        
        await fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ round, nums, bonus })
        });

        alert(`${round}회 당첨번호가 클라우드에 기록되었어!`);
        document.querySelectorAll('input[type="number"]').forEach(input => input.value = '');
        setTimeout(loadDataFromCloud, 1500);
    }

    // 엑셀 업로드 처리
    function handleExcelUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(firstSheet, {header: 1});

            let newRecords = [];
            rows.forEach(row => {
                if (row.length >= 8) {
                    const round = parseInt(row[0]);
                    const nums = [parseInt(row[1]), parseInt(row[2]), parseInt(row[3]), parseInt(row[4]), parseInt(row[5]), parseInt(row[6])];
                    const bonus = parseInt(row[7]);

                    if (!isNaN(round) && !nums.includes(NaN) && !isNaN(bonus)) {
                        nums.sort((a, b) => a - b);
                        newRecords.push({ round, nums, bonus });
                    }
                }
            });

            if (newRecords.length > 0) {
                document.getElementById('dataStatus').innerText = "엑셀 데이터 동기화 중...";
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(newRecords)
                });
                alert(`${newRecords.length}개의 데이터가 구글 시트에 업데이트되었어!`);
                setTimeout(loadDataFromCloud, 2000);
            } else {
                alert('엑셀 파일의 데이터 형식이 올바르지 않아.');
            }
            event.target.value = '';
        };
        reader.readAsArrayBuffer(file);
    }

    // 리셋
    function resetSelection() {
        document.getElementById('fixedNums').value = '';
        const resultArea = document.getElementById('resultArea');
        resultArea.style.display = 'none';
        resultArea.innerHTML = '';
    }

    function getFixedNumbers() {
        const input = document.getElementById('fixedNums').value;
        if(!input.trim()) return [];
        let nums = input.split(',').map(n => parseInt(n.trim()));
        nums = nums.filter(n => !isNaN(n) && n >= 1 && n <= 45);
        return [...new Set(nums)];
    }

    // [VBA 기반 로직 필터링]
    function isValidPattern(nums, lastDrawNums, targetHistory) {
        const sum = nums.reduce((a, b) => a + b, 0);
        if (sum < 100 || sum > 210) return false;

        let maxConsecutive = 1, currentConsecutive = 1;
        for(let i = 0; i < nums.length - 1; i++){
            if(nums[i] + 1 === nums[i+1]) {
                currentConsecutive++;
                maxConsecutive = Math.max(maxConsecutive, currentConsecutive);
            } else { currentConsecutive = 1; }
        }
        if(maxConsecutive >= 3) return false;

        let endDigits = new Array(10).fill(0);
        for(let num of nums) endDigits[num % 10]++;
        if(endDigits.some(count => count >= 3)) return false;

        let oddCount = nums.filter(n => n % 2 !== 0).length;
        if(oddCount < 2 || oddCount > 4) return false;

        let sections = [0, 0, 0];
        for(let num of nums) {
            if(num <= 15) sections[0]++;
            else if(num <= 30) sections[1]++;
            else sections[2]++;
        }
        if(sections.includes(0)) return false;

        if (lastDrawNums && lastDrawNums.length === 6) {
            let matchCount = nums.filter(n => lastDrawNums.includes(n)).length;
            if (matchCount >= 3) return false;
        }

        if (targetHistory && targetHistory.length > 0) {
            for (let past of targetHistory) {
                let isSame = past.nums.every((val, index) => val === nums[index]);
                if (isSame) return false;
            }
        }
        return true;
    }

    // 번호 생성
    function generateLotto(analysisLimit) {
        if (lottoHistory.length === 0) {
            alert('아직 클라우드 데이터를 불러오는 중이야. 잠시만 기다려줘!');
            return;
        }
        const targetHistory = lottoHistory.slice(0, analysisLimit);
        const lastDrawNums = targetHistory.length > 0 ? targetHistory[0].nums : null;
        const fixedNums = getFixedNumbers();

        if (fixedNums.length > 5) {
            alert('고정수는 최대 5개까지만 넣을 수 있어!');
            return;
        }
        
        let generatedSet = null;
        let attempts = 0;

        while(!generatedSet && attempts < 50000) {
            attempts++;
            let candSet = new Set(fixedNums);
            while(candSet.size < 6) { candSet.add(Math.floor(Math.random() * 45) + 1); }
            let arr = Array.from(candSet).sort((a,b) => a-b);
            if(isValidPattern(arr, lastDrawNums, targetHistory)) { generatedSet = arr; }
        }

        const resultArea = document.getElementById('resultArea');
        resultArea.style.display = 'block';

        if(generatedSet) {
            const sum = generatedSet.reduce((a, b) => a + b, 0);
            const formatNumbers = (numsSet) => {
                return numsSet.map(n => 
                    fixedNums.includes(n) ? `<span style="color:#e74c3c; font-weight:900; text-decoration:underline;">${n}</span>` : n
                ).join(', ');
            };

            resultArea.innerHTML = 
                `<span style="color:#008CBA; font-size:0.9em;">행운의 추천 조합</span><br><br>
                 <div style="background:#fff; padding:15px; border-radius:50px; display:inline-block; border:2px solid #a8e6cf; margin-bottom:10px;">
                    [ ${formatNumbers(generatedSet)} ]
                 </div><br>
                 <span style="font-size:0.7em; color:#888;">(번호 합계: ${sum})</span>
                 <div style="font-size:0.55em; color:#999; margin-top:15px; font-weight:normal; line-height:1.4;">
                    * 최근 ${analysisLimit}회 데이터 패턴 분석 및 이월·중복 제외 완료<br>
                    (최종 조합 탐색 시도: ${attempts}회)
                 </div>`;
        } else {
            resultArea.innerHTML = "조건에 맞는 조합을 찾지 못했어. 고정수를 조금 바꿔서 다시 시도해 봐!";
        }
    }

    window.onload = loadDataFromCloud;
</script>

</body>
</html>
