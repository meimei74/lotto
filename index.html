<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>로또 번호 추출기</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            background-color: #f4f7f6; 
            color: #333; 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            justify-content: center; 
        }
        
        /* PC에서는 가로 배열, 모바일에서는 세로 배열을 위한 전체 래퍼 */
        .wrapper {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 950px;
            align-items: flex-start;
        }
        
        .container { 
            background: #fff; 
            flex: 1;
            min-width: 0; /* flex 자식 축소 버그 방지 */
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        
        /* ⭐ 3번 기능: 찜한 번호 보관함 스타일 */
        .favorites-box {
            background: #fff;
            width: 300px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        h2 { text-align: center; color: #008CBA; margin-top: 0; margin-bottom: 25px; font-size: 1.6em; }
        h3 { border-bottom: 2px solid #eee; padding-bottom: 8px; margin-top: 30px; margin-bottom: 15px; color: #555; text-align: center; font-size: 1.15em; }
        
        input[type="number"], input[type="text"] { 
            width: 100%; 
            padding: 12px; 
            text-align: center; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            font-size: 16px; 
            background-color: #fafafa;
            outline: none;
        }
        input:focus { border-color: #008CBA; background-color: #fff; }
        
        .btn { 
            width: 100%;
            padding: 14px 10px; 
            border: none; 
            border-radius: 8px; 
            background-color: #008CBA; 
            color: white; 
            font-weight: bold; 
            font-size: 15px;
            cursor: pointer; 
            transition: all 0.3s; 
        }
        .btn:hover { background-color: #007bb5; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn-excel { background-color: #27ae60; }
        .btn-excel:hover { background-color: #219150; }
        .btn-secondary { background-color: #7f8c8d; }
        .btn-secondary:hover { background-color: #636e72; }
        .btn-scrap { background-color: #ff7675; width: auto; display: inline-block; padding: 10px 20px; margin-top: 15px; font-size: 14px; }
        .btn-scrap:hover { background-color: #e84393; }
        
        .num-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin: 10px 0; }
        .side-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-group-full { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 10px; }

        .result-box { 
            background-color: #eafaf1; 
            border: 1px solid #a8e6cf; 
            padding: 25px 15px; 
            border-radius: 10px; 
            margin-top: 20px; 
            font-size: 1.3em; 
            font-weight: bold; 
            text-align: center; 
            line-height: 1.6; 
            word-break: keep-all;
        }
        
        .status-text { text-align: center; color: #888; font-size: 0.95em; margin: 20px 0; font-weight: bold; padding: 10px; background: #f9f9f9; border-radius: 8px; }
        .loading { color: #3498db; }
        .info-text { text-align: center; font-size: 0.85em; color: #666; margin-top: 4px; margin-bottom: 12px; }
        .excel-guide { font-size: 0.8em; color: #999; text-align: center; margin-top: 10px; line-height: 1.5; padding: 10px; border: 1px dashed #ddd; border-radius: 8px; }

        /* 찜한 번호 아이템 스타일 */
        .fav-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f9f9f9;
            padding: 12px 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid #eee;
            font-weight: bold;
            font-size: 0.95em;
        }
        .fav-del { cursor: pointer; color: #ff7675; font-size: 0.9em; padding: 0 5px; }
        .fav-del:hover { color: #c0392b; font-weight: bold; }

        /* 모바일 세로 모드 최적화 (화면이 850px 이하로 줄어들면 아래로 정렬) */
        @media (max-width: 850px) {
            .wrapper { flex-direction: column; align-items: center; }
            .favorites-box { width: 100%; }
            .num-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .btn-group { grid-template-columns: 1fr; }
            h2 { font-size: 1.4em; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="container">
        <h2>🎰 로또 번호 추출기 (Cloud)</h2>

        <h3>🎯 번호 조건 설정 & 추출</h3>
        
        <input type="text" id="fixedNums" placeholder="고정수 (예: 1, 7) 최대 5개">
        <div class="info-text">(포함할 번호를 쉼표로 구분)</div>

        <input type="text" id="excludedNums" placeholder="제외수 (예: 4, 18) 최대 10개">
        <div class="info-text">(제외할 번호를 쉼표로 구분)</div>

        <div class="btn-group-full" style="margin-top:15px;">
            <button class="btn" onclick="generateLotto(100)">최근 100회 데이터 기준 추출</button>
            <button class="btn" onclick="generateLotto(50)">최근 50회 데이터 기준 추출</button>
            <button class="btn" onclick="generateLotto(30)">최근 30회 데이터 기준 추출</button>
            <button class="btn btn-secondary" onclick="resetSelection()">입력 및 결과 리셋</button>
        </div>

        <div id="resultArea" class="result-box" style="display: none;"></div>

        <div id="dataStatus" class="status-text loading">데이터 동기화 중...</div>

        <h3>📝 최근 당첨 번호 데이터 입력</h3>
        <div class="side-inputs">
            <input type="number" id="round" placeholder="회차">
            <input type="number" id="bonus" placeholder="보너스">
        </div>
        <div class="num-grid">
            <input type="number" id="n1" placeholder="1번"><input type="number" id="n2" placeholder="2번">
            <input type="number" id="n3" placeholder="3번"><input type="number" id="n4" placeholder="4번">
            <input type="number" id="n5" placeholder="5번"><input type="number" id="n6" placeholder="6번">
        </div>
        <div class="btn-group">
            <button class="btn" onclick="saveDraw()">수동 저장</button>
            <button class="btn btn-excel" onclick="document.getElementById('excelUpload').click()">엑셀 업로드</button>
            <input type="file" id="excelUpload" accept=".xlsx, .xls" style="display:none;" onchange="handleExcelUpload(event)">
        </div>
        <div class="excel-guide">
            <b>[엑셀 업로드 가이드]</b><br>
            A열:회차 | B~G열:당첨번호(1~6) | H열:보너스
        </div>
    </div>

    <div class="favorites-box">
        <h3 style="margin-top: 0; border-bottom: 2px solid #008CBA; padding-bottom: 5px; color: #008CBA;">⭐ 찜한 번호 보관함</h3>
        <div id="favList"></div>
    </div>
</div>

<script>
    // 🚨 내 구글 웹 앱 URL 주소로 꼭 변경해줘!
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwvab-whJGjxjEyjbG7zbSwIcemWEwBEQmYe6ZdU0iVFMbBOS7cNZenrbXLw_8vGru2Jg/exec'; 

    let lottoHistory = [];
    let favorites = JSON.parse(localStorage.getItem('lottoFavs')) || [];

    // 클라우드 데이터 로드
    async function loadDataFromCloud() {
        const statusDiv = document.getElementById('dataStatus');
        statusDiv.className = "status-text loading";
        statusDiv.innerText = "구글 시트에서 데이터를 불러오는 중...";
        try {
            const response = await fetch(GAS_URL);
            lottoHistory = await response.json();
            statusDiv.className = "status-text";
            statusDiv.innerText = `현재 저장된 데이터: ${lottoHistory.length}개`;
        } catch (error) {
            statusDiv.className = "status-text";
            statusDiv.style.color = "red";
            statusDiv.innerText = "연결 실패! 구글 시트 설정을 확인해줘.";
        }
    }

    // ⭐ 3번 기능: 찜한 번호 보관함 출력 및 삭제 로직
    function renderFavorites() {
        const favListDiv = document.getElementById('favList');
        favListDiv.innerHTML = '';
        if (favorites.length === 0) {
            favListDiv.innerHTML = '<div style="color:#999; text-align:center; padding:20px; font-size:0.9em;">찜한 조합이 없습니다.</div>';
            return;
        }
        favorites.forEach((setStr, index) => {
            const formatted = setStr.split(',').map(n => String(n).padStart(2, '0')).join(', ');
            favListDiv.innerHTML += `
                <div class="fav-item">
                    <span>📌 [ ${formatted} ]</span>
                    <span class="fav-del" onclick="deleteFavorite(${index})">❌</span>
                </div>
            `;
        });
    }

    function scrapNumber(numStr) {
        if (favorites.includes(numStr)) {
            alert('이미 보관함에 찜한 번호야!');
            return;
        }
        favorites.unshift(numStr); // 최신 스크랩이 맨 위로
        localStorage.setItem('lottoFavs', JSON.stringify(favorites));
        renderFavorites();
        alert('보관함에 번호를 저장했어!');
    }

    function deleteFavorite(index) {
        favorites.splice(index, 1); // 배열에서 실제 삭제
        localStorage.setItem('lottoFavs', JSON.stringify(favorites));
        renderFavorites(); // 화면 새로고침
    }

    // 데이터 수동 저장
    async function saveDraw() {
        const round = parseInt(document.getElementById('round').value);
        const nums = [
            parseInt(document.getElementById('n1').value), parseInt(document.getElementById('n2').value),
            parseInt(document.getElementById('n3').value), parseInt(document.getElementById('n4').value),
            parseInt(document.getElementById('n5').value), parseInt(document.getElementById('n6').value)
        ];
        const bonus = parseInt(document.getElementById('bonus').value);

        if(isNaN(round) || nums.includes(NaN) || isNaN(bonus)) {
            alert('회차와 모든 번호를 정확히 입력해줘!');
            return;
        }
        nums.sort((a, b) => a - b);

        document.getElementById('dataStatus').innerText = "데이터 업로드 중...";
        await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ round, nums, bonus }) });
        alert(`${round}회 당첨번호가 기록되었어!`);
        document.querySelectorAll('.num-grid input, .side-inputs input').forEach(input => input.value = '');
        setTimeout(loadDataFromCloud, 1500);
    }

    // 엑셀 업로드
    function handleExcelUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
            let newRecords = [];
            rows.forEach(row => {
                if (row.length >= 8) {
                    const round = parseInt(row[0]);
                    const nums = [parseInt(row[1]), parseInt(row[2]), parseInt(row[3]), parseInt(row[4]), parseInt(row[5]), parseInt(row[6])];
                    const bonus = parseInt(row[7]);
                    if (!isNaN(round) && !nums.includes(NaN) && !isNaN(bonus)) {
                        nums.sort((a, b) => a - b);
                        newRecords.push({ round, nums, bonus });
                    }
                }
            });
            if (newRecords.length > 0) {
                document.getElementById('dataStatus').innerText = "엑셀 데이터 동기화 중...";
                await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(newRecords) });
                alert(`${newRecords.length}개의 데이터가 구글 시트에 업데이트되었어!`);
                setTimeout(loadDataFromCloud, 2000);
            } else { alert('엑셀 파일의 데이터 형식이 올바르지 않아.'); }
            event.target.value = '';
        };
        reader.readAsArrayBuffer(file);
    }

    // 리셋
    function resetSelection() {
        document.getElementById('fixedNums').value = '';
        document.getElementById('excludedNums').value = '';
        const resultArea = document.getElementById('resultArea');
        resultArea.style.display = 'none';
        resultArea.innerHTML = '';
    }

    function parseCommaInput(id) {
        const input = document.getElementById(id).value;
        if(!input.trim()) return [];
        let nums = input.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n) && n >= 1 && n <= 45);
        return [...new Set(nums)];
    }

    // ⭐ 2번 기능: 데이터베이스 기반 장기 미출현 번호 가중치 부여 랜덤 추출 함수 (Hot & Cold)
    function getWeightedRandom(currentSet, excludedNums, targetHistory) {
        let weights = new Array(46).fill(0);
        let totalWeight = 0;

        let counts = new Array(46).fill(0);
        let intervals = new Array(46).fill(targetHistory.length); // 기본값은 최대 미출현 값

        // 1. 역대 출현 빈도 계산
        targetHistory.forEach(draw => {
            draw.nums.forEach(n => { if(n >= 1 && n <= 45) counts[n]++; });
        });

        // 2. 미출현 기간(Interval) 계산
        for (let i = 1; i <= 45; i++) {
            for (let j = 0; j < targetHistory.length; j++) {
                if (targetHistory[j].nums.includes(i)) {
                    intervals[i] = j; // 0이면 직전 회차 출현, 클수록 오랫동안 안 나온 수
                    break;
                }
            }
        }

        // 3. 번호별 가중치 산출 (Cold 보너스 점수 부여)
        for (let i = 1; i <= 45; i++) {
            if (currentSet.includes(i) || excludedNums.includes(i)) {
                weights[i] = 0; // 고정수 세트에 이미 있거나 제외수면 확률 0%
                continue;
            }
            // 출현 빈도가 낮을수록(100 - counts), 안 나온 기간이 길수록(intervals * 2) 가중치 대폭 증가
            let w = (100 - counts[i]) + (intervals[i] * 2);
            weights[i] = Math.max(1, w); 
            totalWeight += weights[i];
        }

        // 4. 가중치 기반 주사위 굴리기
        let rnd = Math.random() * totalWeight;
        let sum = 0;
        for (let i = 1; i <= 45; i++) {
            sum += weights[i];
            if (rnd <= sum) return i;
        }
        return Math.floor(Math.random() * 45) + 1;
    }

    // 기본 규칙 검증 필터 (VBA 기반)
    function isValidPattern(nums, lastDrawNums, targetHistory) {
        const sum = nums.reduce((a, b) => a + b, 0);
        if (sum < 100 || sum > 210) return false;

        let maxConsecutive = 1, currentConsecutive = 1;
        for(let i = 0; i < nums.length - 1; i++){
            if(nums[i] + 1 === nums[i+1]) {
                currentConsecutive++;
                maxConsecutive = Math.max(maxConsecutive, currentConsecutive);
            } else { currentConsecutive = 1; }
        }
        if(maxConsecutive >= 3) return false;

        let endDigits = new Array(10).fill(0);
        for(let num of nums) endDigits[num % 10]++;
        if(endDigits.some(count => count >= 3)) return false;

        let oddCount = nums.filter(n => n % 2 !== 0).length;
        if(oddCount < 2 || oddCount > 4) return false;

        let sections = [0, 0, 0];
        for(let num of nums) {
            if(num <= 15) sections[0]++;
            else if(num <= 30) sections[1]++;
            else sections[2]++;
        }
        if(sections.includes(0)) return false;

        if (lastDrawNums && lastDrawNums.length === 6) {
            let matchCount = nums.filter(n => lastDrawNums.includes(n)).length;
            if (matchCount >= 3) return false;
        }

        if (targetHistory && targetHistory.length > 0) {
            for (let past of targetHistory) {
                let isSame = past.nums.every((val, index) => val === nums[index]);
                if (isSame) return false;
            }
        }
        return true;
    }

    // 번호 생성 엔진
    function generateLotto(analysisLimit) {
        const targetHistory = lottoHistory.slice(0, analysisLimit);
        const lastDrawNums = targetHistory.length > 0 ? targetHistory[0].nums : null;
        
        const fixedNums = parseCommaInput('fixedNums');
        const excludedNums = parseCommaInput('excludedNums');

        // 예외 조건 처리
        if (fixedNums.length > 5) { alert('고정수는 최대 5개까지만 넣을 수 있어!'); return; }
        if (fixedNums.some(n => excludedNums.includes(n))) { alert('고정수와 제외수에 같은 숫자가 들어가 있어! 확인해 줘.'); return; }
        if (45 - excludedNums.length < 6) { alert('제외수가 너무 많아서 조합을 만들 수 없어!'); return; }
        
        let generatedSet = null;
        let attempts = 0;

        while(!generatedSet && attempts < 50000) {
            attempts++;
            let candSet = new Set(fixedNums);
            
            while(candSet.size < 6) {
                // ⭐ 2번 가중치 반영된 번호 뽑기 모듈 호출
                let nextNum = getWeightedRandom(Array.from(candSet), excludedNums, targetHistory);
                candSet.add(nextNum);
            }
            
            let arr = Array.from(candSet).sort((a,b) => a-b);
            if(isValidPattern(arr, lastDrawNums, targetHistory)) { generatedSet = arr; }
        }

        const resultArea = document.getElementById('resultArea');
        resultArea.style.display = 'block';

        if(generatedSet) {
            const sum = generatedSet.reduce((a, b) => a + b, 0);
            const formatNumbers = (numsSet) => {
                return numsSet.map(n => {
                    if (fixedNums.includes(n)) return `<span style="color:#e74c3c; font-weight:900; text-decoration:underline;">${n}</span>`;
                    return n;
                }).join(', ');
            };

            // 결과창 내부 구성 (⭐ 3번기능: 찜하기 버튼 연동)
            resultArea.innerHTML = 
                `<span style="color:#008CBA; font-size:0.9em;">행운의 추천 조합</span><br><br>
                 <div style="background:#fff; padding:15px; border-radius:50px; display:inline-block; border:2px solid #a8e6cf; margin-bottom:5px;">
                    [ ${formatNumbers(generatedSet)} ]
                 </div><br>
                 <span style="font-size:0.7em; color:#888;">(번호 합계: ${sum})</span><br>
                 <button class="btn btn-scrap" onclick="scrapNumber('${generatedSet.join(',')}')">⭐ 이 번호 찜하기</button>
                 <div style="font-size:0.55em; color:#999; margin-top:15px; font-weight:normal; line-height:1.4;">
                    * 최근 ${analysisLimit}회 기준 장기 미출현수 가중 보정 및 제외 필터 완료<br>
                    (최종 조합 탐색 시도: ${attempts}회)
                 </div>`;
        } else {
            resultArea.innerHTML = "조건에 맞는 조합을 찾지 못했어. 고정수나 제외수 조건을 조금 완화해 봐!";
        }
    }

    // 초기 로드 시 클라우드 데이터와 로컬 스크랩 목록 동시에 불러오기
    window.onload = function() {
        loadDataFromCloud();
        renderFavorites();
    };
</script>

</body>
</html>
